<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Checkout</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            class="form-control mb-3"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="form-control mb-3"
            required>

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
            class="form-control mb-3"
            required>

        <textarea
            name="address"
            placeholder="Delivery Address"
            class="form-control mb-3"
            required></textarea>

        <h4>
            Total Amount: ₹{{ total }}
        </h4>

        <button
            class="btn btn-success">

            Place Order

        </button>

    </form>

</div>

</body>
</html>
