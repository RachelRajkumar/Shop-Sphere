<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .login-title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-login {
            width: 100%;
            background: #4e54c8;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #3c40a0;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .footer-text a {
            text-decoration: none;
            color: #4e54c8;
            font-weight: bold;
        }

        .error-box {
            background: #ffdddd;
            color: #a70000;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="login-title">
        🔐 Login
    </div>

    <form method="POST">
        {% csrf_token %}

        {% if form.errors %}
            <div class="error-box">
                Invalid username or password
            </div>
        {% endif %}

        <!-- Username -->
        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required
                   autofocus>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>
    </form>

    <div class="footer-text">
        Don't have an account?
        <a href="/accounts/register/">Register</a>
    </div>

</div>

</body>
</html>
