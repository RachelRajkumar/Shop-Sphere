<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Checkout</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               class="form-control mb-3"
               placeholder="Full Name"
               required>

        <input type="email"
               name="email"
               class="form-control mb-3"
               placeholder="Email"
               required>

        <input type="text"
               name="phone"
               class="form-control mb-3"
               placeholder="Phone Number"
               required>

        <textarea name="address"
                  class="form-control mb-3"
                  placeholder="Address"
                  required></textarea>

        <h4>Total Amount: ₹{{ total }}</h4>

        <button class="btn btn-success">
            Place Order
        </button>

    </form>

</div>

</body>
</html>
